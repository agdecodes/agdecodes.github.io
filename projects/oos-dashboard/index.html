<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Express OOS Revenue-Loss Assurance | KSA Beauty Category | Abhinav Goyal</title>
<meta name="description" content="Interactive OOS analytics dashboard — E-commerce KSA Beauty category, by Abhinav Goyal" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; background: #F2F3F7; }
  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-thumb { background: #D7DBE2; border-radius: 3px; }
</style>
</head>
<body>
<div id="root">
  <div style="padding:40px;text-align:center;color:#7C8798;font-family:sans-serif;">Loading dashboard…</div>
</div>

<script type="text/plain" id="app-source">
const { useState, useMemo } = React;

// ---------------------------------------------------------------------------
// Inline icon set (no external icon library — keeps this a zero-dependency file)
// ---------------------------------------------------------------------------
const Icon = ({ path, color = "currentColor", size = 15, fill = "none" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d={path} />
  </svg>
);
const ICONS = {
  shield: "M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z",
  package: "M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8M12 13v8",
  users: "M17 21v-2a4 4 0 0 0-3-3.87M9 21v-2a4 4 0 0 1 3-3.87M13 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0zM23 21v-2a4 4 0 0 0-3-3.85",
  wrench: "M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17l-2 2 3 3 2-2 5.4-5.4a4 4 0 0 1 5.4-5.4z",
  trendDown: "M23 18l-9.5-9.5-5 5L1 6M17 18h6v-6",
  trendUp: "M23 6l-9.5 9.5-5-5L1 18M17 6h6v6",
  search: "M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.35-4.35",
  layers: "M12 2l10 6-10 6L2 8l10-6zM2 16l10 6 10-6M2 12l10 6 10-6",
  arrowUpDown: "M8 9l4-4 4 4M8 15l4 4 4-4",
  bolt: "M13 2L3 14h8l-1 8 11-14h-8l1-6z",
  chevron: "M9 18l6-6-6-6",
};

const NAVY = "#161B33";
const SLATE = "#7C8798";
const YELLOW = "#FEDE00";
const TEAL = "#0FA3A3";
const RED = "#E1553F";
const PURPLE = "#5B6FE0";
const AMBER = "#F2994A";

// ---------------------------------------------------------------------------
// Real project anchors (from AG's actual e-commerce OOS work):
//  - 4 KSA Beauty sub-categories: Fragrance, Colour Cosmetics, Hair & Personal Care, EPC
//  - Express OOS revenue-loss held under a 25% assurance threshold through Q2 2026
//  - Foundational double-count bug (sku_priority + oos_complete) diagnosed & fixed Mar 2026
//  - ~8,000 SKUs benchmarked under the Price Competitiveness standard (same pipeline)
//  - 12 AMs supported across KSA Beauty & AE/SA FMCG
//  - A parallel 4x GMV-overstatement bug was caught in the same Deep Dive Dashboard lineage
//  - A "Retail Inventory Health" view shifted the team from reactive to proactive stock mgmt
// Exact confidential figures are illustrative — shape & direction match the real project.
// ---------------------------------------------------------------------------
const CATS = [
  { key: "Fragrance",             am: "Sara K.",   color: TEAL   },
  { key: "Colour Cosmetics",      am: "Faisal R.", color: AMBER  },
  { key: "Hair & Personal Care",  am: "Sara K.",   color: PURPLE },
  { key: "EPC",                   am: "Nadia H.",  color: RED    },
];

const TREND = [
  { month: "Jan", Fragrance: 22.4, "Colour Cosmetics": 27.8, "Hair & Personal Care": 18.1, EPC: 24.9 },
  { month: "Feb", Fragrance: 21.1, "Colour Cosmetics": 26.3, "Hair & Personal Care": 17.4, EPC: 23.5 },
  { month: "Mar", Fragrance: 16.8, "Colour Cosmetics": 22.6, "Hair & Personal Care": 13.0, EPC: 20.1 },
  { month: "Apr", Fragrance: 15.3, "Colour Cosmetics": 21.4, "Hair & Personal Care": 12.2, EPC: 19.0 },
  { month: "May", Fragrance: 14.6, "Colour Cosmetics": 20.9, "Hair & Personal Care": 11.8, EPC: 18.4 },
  { month: "Jun", Fragrance: 14.2, "Colour Cosmetics": 21.8, "Hair & Personal Care": 11.5, EPC: 18.6 },
];

// Root-cause split of current-month loss, per category — illustrative decomposition
// reflecting how Express OOS loss is typically diagnosed downstream of the metric fix.
const ROOT_CAUSE_SHARE = { vendor: 0.46, fulfillment: 0.34, catalog: 0.20 };
const CAUSE_META = [
  { key: "vendor",      label: "Vendor Non-Fulfillment",   color: RED    },
  { key: "fulfillment", label: "Warehouse / Fulfillment",  color: AMBER  },
  { key: "catalog",     label: "Catalog / Listing Gap",    color: PURPLE },
];

function Card({ children, className = "" }) {
  return <div className={`bg-white rounded-xl border border-gray-200 shadow-sm ${className}`}>{children}</div>;
}

function Chip({ active, color, children, onClick }) {
  return (
    <button
      onClick={onClick}
      className="px-2.5 py-1 rounded-full text-[11px] font-medium border transition-all"
      style={{
        borderColor: color,
        background: active ? color : "white",
        color: active ? "white" : color,
      }}
    >
      {children}
    </button>
  );
}

// ---------------------------------------------------------------------------
// Donut gauge — pure SVG, shows % of the 25% assurance threshold consumed
// ---------------------------------------------------------------------------
function AssuranceDonut({ pct, color }) {
  const r = 42, C = 2 * Math.PI * r;
  const dash = (pct / 100) * C;
  return (
    <svg width="110" height="110" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r={r} fill="none" stroke="#EEF0F3" strokeWidth="11" />
      <circle
        cx="55" cy="55" r={r} fill="none" stroke={color} strokeWidth="11"
        strokeDasharray={`${dash} ${C - dash}`} strokeLinecap="round"
        transform="rotate(-90 55 55)"
      />
      <text x="55" y="51" textAnchor="middle" fontSize="20" fontWeight="700" fill={NAVY}>{pct.toFixed(0)}%</text>
      <text x="55" y="67" textAnchor="middle" fontSize="8" fill={SLATE}>of threshold used</text>
    </svg>
  );
}

// ---------------------------------------------------------------------------
// Trend chart — pure SVG line chart (deliberately avoids external chart libs,
// which is what broke rendering earlier under GitHub Pages CDN constraints)
// ---------------------------------------------------------------------------
function TrendChart({ active }) {
  const W = 800, H = 300;
  const padL = 40, padR = 20, padT = 20, padB = 30;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const yMax = 30;
  const xFor = (i) => padL + (i / (TREND.length - 1)) * chartW;
  const yFor = (v) => padT + chartH - (v / yMax) * chartH;
  const [hover, setHover] = useState(null);

  return (
    <div className="w-full overflow-x-auto">
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ minWidth: 560 }}>
        <rect x={xFor(0)} y={padT} width={xFor(1) - xFor(0)} height={chartH} fill={RED} opacity="0.06" />
        {[0, 5, 10, 15, 20, 25, 30].map((v) => (
          <g key={v}>
            <line x1={padL} y1={yFor(v)} x2={W - padR} y2={yFor(v)} stroke="#EAECEF" strokeWidth="1" />
            <text x={padL - 6} y={yFor(v) + 3} fontSize="9" fill={SLATE} textAnchor="end">{v}%</text>
          </g>
        ))}
        <line x1={padL} y1={yFor(25)} x2={W - padR} y2={yFor(25)} stroke={RED} strokeWidth="1.5" strokeDasharray="5 4" />
        <text x={W - padR} y={yFor(25) - 5} fontSize="10" fontWeight="600" fill={RED} textAnchor="end">25% threshold</text>
        <line x1={xFor(2)} y1={padT} x2={xFor(2)} y2={padT + chartH} stroke={TEAL} strokeWidth="1.5" strokeDasharray="2 3" />
        <text x={xFor(2)} y={padT - 6} fontSize="9" fontWeight="600" fill={TEAL} textAnchor="middle">fix shipped</text>
        {TREND.map((d, i) => (
          <text key={d.month} x={xFor(i)} y={H - 8} fontSize="10" fill={SLATE} textAnchor="middle">{d.month}</text>
        ))}
        {CATS.map((c) => {
          const isDim = active && active !== c.key;
          const points = TREND.map((d, i) => `${xFor(i)},${yFor(d[c.key])}`).join(" ");
          return (
            <g key={c.key} opacity={isDim ? 0.15 : 1}>
              <polyline points={points} fill="none" stroke={c.color} strokeWidth={active === c.key ? 3.5 : 2} strokeLinecap="round" strokeLinejoin="round" />
              {TREND.map((d, i) => (
                <circle
                  key={i} cx={xFor(i)} cy={yFor(d[c.key])} r={active === c.key ? 4.5 : 3.5}
                  fill="white" stroke={c.color} strokeWidth="2"
                  onMouseEnter={() => setHover({ i, key: c.key, val: d[c.key] })}
                  onMouseLeave={() => setHover(null)}
                  style={{ cursor: "pointer" }}
                />
              ))}
            </g>
          );
        })}
        {hover && (
          <g>
            <rect x={xFor(hover.i) - 40} y={yFor(hover.val) - 32} width="80" height="22" rx="4" fill={NAVY} opacity="0.94" />
            <text x={xFor(hover.i)} y={yFor(hover.val) - 17} fontSize="10" fill="white" textAnchor="middle" fontWeight="600">
              {hover.key.split(" ")[0]}: {hover.val}%
            </text>
          </g>
        )}
      </svg>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Root cause — horizontal stacked bars per category
// ---------------------------------------------------------------------------
function RootCauseChart({ rows, active }) {
  const maxVal = Math.max(...rows.map((r) => r.now)) * 1.1;
  return (
    <div className="space-y-4">
      {rows.filter((r) => !active || r.key === active).map((r) => {
        const vendor = r.now * ROOT_CAUSE_SHARE.vendor;
        const fulfillment = r.now * ROOT_CAUSE_SHARE.fulfillment;
        const catalog = r.now * ROOT_CAUSE_SHARE.catalog;
        const segs = [
          { v: vendor, color: RED },
          { v: fulfillment, color: AMBER },
          { v: catalog, color: PURPLE },
        ];
        return (
          <div key={r.key}>
            <div className="flex justify-between items-center mb-1">
              <span className="text-xs font-medium text-[#1F2A44] flex items-center gap-1.5">
                <span className="w-2 h-2 rounded-full inline-block" style={{ background: r.color }}></span>
                {r.key}
              </span>
              <span className="text-xs font-semibold text-[#5A6472]">{r.now.toFixed(1)}%</span>
            </div>
            <div className="w-full h-5 rounded-md overflow-hidden flex bg-gray-100">
              {segs.map((s, i) => (
                <div key={i} style={{ width: `${(s.v / maxVal) * 100}%`, background: s.color }} title={`${s.v.toFixed(1)}%`} />
              ))}
            </div>
          </div>
        );
      })}
      <div className="flex gap-4 pt-1">
        {CAUSE_META.map((c) => (
          <span key={c.key} className="flex items-center gap-1.5 text-[10px] text-[#7C8798]">
            <span className="w-2 h-2 rounded-sm inline-block" style={{ background: c.color }}></span>
            {c.label}
          </span>
        ))}
      </div>
    </div>
  );
}

function OOSDashboard() {
  const [active, setActive] = useState(null);
  const [tab, setTab] = useState("trend");
  const [query, setQuery] = useState("");
  const [sortKey, setSortKey] = useState("now");
  const [sortDir, setSortDir] = useState("desc");

  const latest = TREND[TREND.length - 1];
  const first = TREND[0];

  const rows = useMemo(() => CATS.map((c) => ({
    ...c,
    now: latest[c.key],
    then: first[c.key],
    delta: +(latest[c.key] - first[c.key]).toFixed(1),
  })), []);

  const blendedNow = rows.reduce((s, r) => s + r.now, 0) / rows.length;
  const blendedThen = rows.reduce((s, r) => s + r.then, 0) / rows.length;
  const thresholdUsedPct = (blendedNow / 25) * 100;

  const filteredSortedRows = useMemo(() => {
    let out = rows.filter(
      (r) => !query || r.key.toLowerCase().includes(query.toLowerCase()) || r.am.toLowerCase().includes(query.toLowerCase())
    );
    out = [...out].sort((a, b) => {
      const va = a[sortKey], vb = b[sortKey];
      if (typeof va === "string") return sortDir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortDir === "asc" ? va - vb : vb - va;
    });
    return out;
  }, [rows, query, sortKey, sortDir]);

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(sortDir === "asc" ? "desc" : "asc");
    else { setSortKey(key); setSortDir("desc"); }
  };

  const selected = active ? rows.find((r) => r.key === active) : null;
  const insight = selected
    ? `${selected.key} sits at ${selected.now}% loss (owned by ${selected.am}), down ${Math.abs(selected.delta)}pp since the March fix — ${selected.now > 20 ? "still the highest-risk sub-category, worth an AM check-in this week." : "comfortably inside the assurance band."}`
    : `Blended Express OOS loss is ${blendedNow.toFixed(1)}% against a 25% ceiling — all 4 sub-categories have stayed inside the assurance band since the methodology fix shipped in March.`;

  const TABS = [
    { key: "trend", label: "Trend & Threshold", icon: ICONS.trendDown },
    { key: "cause", label: "Root Cause Breakdown", icon: ICONS.layers },
    { key: "ownership", label: "AM Ownership", icon: ICONS.users },
  ];

  return (
    <div className="min-h-screen p-4 md:p-7 max-w-6xl mx-auto" style={{ fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif" }}>
      {/* Hero */}
      <div className="rounded-xl mb-5 p-5 md:p-6 relative overflow-hidden" style={{ background: NAVY }}>
        <div className="absolute right-0 top-0 h-full w-1.5" style={{ background: YELLOW }} />
        <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div>
            <span className="text-[11px] font-bold tracking-widest uppercase" style={{ color: YELLOW }}>
              E-commerce · KSA Beauty
            </span>
            <h1 className="text-white text-xl md:text-2xl font-semibold tracking-tight mt-1">
              Express OOS Revenue-Loss Assurance
            </h1>
            <p className="text-[13px] text-slate-300 mt-1">
              Standing risk signal across 4 sub-categories · BigQuery + Airflow, twice-daily refresh
            </p>
          </div>
          <div className="flex items-center gap-4">
            <AssuranceDonut pct={thresholdUsedPct} color={thresholdUsedPct > 85 ? RED : TEAL} />
            <div className="flex items-center gap-2 bg-white/5 border border-white/10 rounded-lg px-4 py-3">
              <Icon path={ICONS.shield} color={YELLOW} size={24} />
              <div>
                <div className="text-white text-base font-bold leading-none">&lt; 25% held</div>
                <div className="text-[10.5px] text-slate-300 mt-0.5">all 4 sub-cats, through Q2 2026</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Dynamic insight strip */}
      <Card className="p-3.5 mb-5 flex items-start gap-2.5" style={{ borderLeft: `3px solid ${TEAL}` }}>
        <Icon path={ICONS.bolt} color={TEAL} size={16} />
        <p className="text-[12.5px] text-[#3D4657] leading-relaxed">{insight}</p>
      </Card>

      {/* KPI row */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        <Card className="p-4">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs text-[#7C8798] font-medium">Blended Loss %, Jun</span>
            <Icon path={ICONS.package} color={SLATE} />
          </div>
          <div className="text-2xl font-bold text-[#1F2A44]">{blendedNow.toFixed(1)}%</div>
          <div className="text-[11px] mt-1 flex items-center gap-1" style={{ color: TEAL }}>
            <Icon path={ICONS.trendDown} size={11} color={TEAL} /> {(blendedThen - blendedNow).toFixed(1)}pp since Jan
          </div>
        </Card>
        <Card className="p-4">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs text-[#7C8798] font-medium">SKUs Price-Benchmarked</span>
            <Icon path={ICONS.package} color={SLATE} />
          </div>
          <div className="text-2xl font-bold text-[#1F2A44]">~8,000</div>
          <div className="text-[11px] text-[#7C8798] mt-1">shared pipeline w/ Price Competitiveness standard</div>
        </Card>
        <Card className="p-4">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs text-[#7C8798] font-medium">AMs Supported</span>
            <Icon path={ICONS.users} color={SLATE} />
          </div>
          <div className="text-2xl font-bold text-[#1F2A44]">12</div>
          <div className="text-[11px] text-[#7C8798] mt-1">across KSA Beauty &amp; AE/SA FMCG</div>
        </Card>
        <Card className="p-4">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs text-[#7C8798] font-medium">Methodology Fix</span>
            <Icon path={ICONS.wrench} color={TEAL} />
          </div>
          <div className="text-2xl font-bold" style={{ color: TEAL }}>Mar '26</div>
          <div className="text-[11px] text-[#7C8798] mt-1">sku_priority + oos_complete de-dup shipped</div>
        </Card>
      </div>

      {/* Tab bar */}
      <div className="flex gap-1.5 mb-4 bg-white border border-gray-200 rounded-lg p-1 w-fit overflow-x-auto">
        {TABS.map((t) => (
          <button
            key={t.key}
            onClick={() => setTab(t.key)}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium whitespace-nowrap transition-colors"
            style={{ background: tab === t.key ? NAVY : "transparent", color: tab === t.key ? "white" : "#5A6472" }}
          >
            <Icon path={t.icon} size={13} color={tab === t.key ? YELLOW : SLATE} />
            {t.label}
          </button>
        ))}
      </div>

      {/* Category filter chips (shared across tabs) */}
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <div className="flex gap-1.5 flex-wrap">
          {CATS.map((c) => (
            <Chip key={c.key} active={active === c.key} color={c.color} onClick={() => setActive(active === c.key ? null : c.key)}>
              {c.key}
            </Chip>
          ))}
        </div>
        {tab === "ownership" && (
          <div className="relative">
            <Icon path={ICONS.search} size={13} color={SLATE} />
            <input
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="Search category or AM..."
              className="text-xs border border-gray-200 rounded-md pl-7 pr-3 py-1.5 outline-none focus:border-[#0FA3A3] w-52"
              style={{ marginLeft: "-20px" }}
            />
          </div>
        )}
      </div>

      {/* Tab content */}
      {tab === "trend" && (
        <Card className="p-4 md:p-5 mb-5">
          <p className="text-[11px] text-[#7C8798] mb-2">shaded band = pre-fix double-counted readings · tap a chip above to isolate a line · hover dots for exact values</p>
          <TrendChart active={active} />
        </Card>
      )}

      {tab === "cause" && (
        <Card className="p-4 md:p-5 mb-5">
          <p className="text-[11px] text-[#7C8798] mb-3">
            Current-month Express OOS loss decomposed by root cause — diagnosis layer built on top of the corrected sku_priority + oos_complete logic.
          </p>
          <RootCauseChart rows={rows} active={active} />
        </Card>
      )}

      {tab === "ownership" && (
        <Card className="p-4 md:p-5 mb-5">
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="text-left text-[#7C8798] border-b border-gray-200">
                  {[
                    ["key", "Sub-Category"], ["am", "AM Owner"], ["then", "Jan (pre-fix)"],
                    ["now", "Jun (current)"], ["delta", "Movement"],
                  ].map(([k, label]) => (
                    <th key={k} className="py-2 pr-4 font-medium cursor-pointer select-none" onClick={() => toggleSort(k)}>
                      <span className="inline-flex items-center gap-1">
                        {label}
                        <Icon path={ICONS.arrowUpDown} size={10} color={sortKey === k ? TEAL : "#C7CCD4"} />
                      </span>
                    </th>
                  ))}
                  <th className="py-2 font-medium">Status</th>
                </tr>
              </thead>
              <tbody>
                {filteredSortedRows.map((r) => (
                  <tr key={r.key} className="border-b border-gray-100 hover:bg-gray-50 cursor-pointer" onClick={() => setActive(active === r.key ? null : r.key)}>
                    <td className="py-2 pr-4 font-medium text-[#1F2A44]">
                      <span className="inline-flex items-center gap-2">
                        <span className="w-2 h-2 rounded-full inline-block" style={{ background: r.color }}></span>
                        {r.key}
                      </span>
                    </td>
                    <td className="py-2 pr-4 text-[#5A6472]">{r.am}</td>
                    <td className="py-2 pr-4 text-[#7C8798]">{r.then}%</td>
                    <td className="py-2 pr-4 font-semibold text-[#1F2A44]">{r.now}%</td>
                    <td className="py-2 pr-4 font-semibold" style={{ color: TEAL }}>
                      <span className="inline-flex items-center gap-1">
                        <Icon path={ICONS.trendDown} size={12} color={TEAL} /> {Math.abs(r.delta)}pp
                      </span>
                    </td>
                    <td className="py-2">
                      <span className="px-2 py-0.5 rounded-full text-[10px] font-semibold" style={{ background: "#E4F7F5", color: "#0B7A7A" }}>
                        Within 25% threshold
                      </span>
                    </td>
                  </tr>
                ))}
                {filteredSortedRows.length === 0 && (
                  <tr><td colSpan="6" className="py-4 text-center text-[#7C8798]">No matches for "{query}"</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      {/* Footnote */}
      <Card className="p-3.5 mb-4">
        <p className="text-[11px] text-[#7C8798] leading-relaxed">
          <span className="font-semibold text-[#5A6472]">Methodology:</span> Express OOS revenue-loss % is computed
          on a de-duplicated <span className="font-mono text-[10.5px]">sku_priority + oos_complete</span> basis — a
          foundational double-count in the legacy metric was diagnosed and corrected in March 2026, in the same Deep
          Dive Dashboard lineage that surfaced a separate 4x GMV-overstatement bug. Corrected OOS logic now underpins
          the Retail Inventory Health view and shares its pipeline with the Price Competitiveness standard (~8,000
          SKUs) and the AM/Seller Performance Dashboard (BigQuery + Airflow, twice-daily DAG). Figures shown reflect
          the real project's scope and direction; exact confidential values are illustrative.
        </p>
      </Card>

<script>
  // Manually transform with the CLASSIC JSX runtime (React.createElement) — the
  // newer "automatic" runtime injects an ES module import statement that fails
  // when executed as a plain inline script (non-module), which is what caused
  // the earlier blank-page bug on GitHub Pages.
  var src = document.getElementById("app-source").textContent;
  var output = Babel.transform(src, {
    presets: [["react", { runtime: "classic" }]]
  }).code;
  var script = document.createElement("script");
  script.textContent = output;
  document.body.appendChild(script);
</script>
