<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Express OOS Revenue-Loss Assurance | Noon.com KSA Beauty | Abhinav Goyal</title>
<meta name="description" content="Interactive OOS analytics dashboard — Noon.com KSA Beauty, by Abhinav Goyal" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; background: #F4F5F8; }
</style>
</head>
<body>
<div id="root">
  <div style="padding:40px;text-align:center;color:#7C8798;font-family:sans-serif;">Loading dashboard…</div>
</div>

<script type="text/plain" id="app-source">
const { useState } = React;

// ---- inline icon set ----
const Icon = ({ path, color = "currentColor", size = 15 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d={path} />
  </svg>
);
const ICONS = {
  shield: "M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z",
  package: "M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8M12 13v8",
  users: "M17 21v-2a4 4 0 0 0-3-3.87M9 21v-2a4 4 0 0 1 3-3.87M13 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0zM23 21v-2a4 4 0 0 0-3-3.85",
  wrench: "M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17l-2 2 3 3 2-2 5.4-5.4a4 4 0 0 1 5.4-5.4z",
  trendDown: "M23 18l-9.5-9.5-5 5L1 6M17 18h6v-6",
};

// Real project anchors: 4 KSA Beauty sub-categories, 12 AMs, ~8,000 SKUs price-benchmarked,
// Express OOS held <25% loss through Q2 2026, sku_priority + oos_complete double-count fix (Mar 2026).
const CATS = [
  { key: "Fragrance", am: "Sara K.", color: "#0FA3A3" },
  { key: "Colour Cosmetics", am: "Faisal R.", color: "#F2994A" },
  { key: "Hair & Personal Care", am: "Sara K.", color: "#5B6FE0" },
  { key: "EPC", am: "Nadia H.", color: "#E1553F" },
];

const TREND = [
  { month: "Jan", Fragrance: 22.4, "Colour Cosmetics": 27.8, "Hair & Personal Care": 18.1, EPC: 24.9 },
  { month: "Feb", Fragrance: 21.1, "Colour Cosmetics": 26.3, "Hair & Personal Care": 17.4, EPC: 23.5 },
  { month: "Mar", Fragrance: 16.8, "Colour Cosmetics": 22.6, "Hair & Personal Care": 13.0, EPC: 20.1 },
  { month: "Apr", Fragrance: 15.3, "Colour Cosmetics": 21.4, "Hair & Personal Care": 12.2, EPC: 19.0 },
  { month: "May", Fragrance: 14.6, "Colour Cosmetics": 20.9, "Hair & Personal Care": 11.8, EPC: 18.4 },
  { month: "Jun", Fragrance: 14.2, "Colour Cosmetics": 21.8, "Hair & Personal Care": 11.5, EPC: 18.6 },
];

const NAVY = "#161B33";
const SLATE = "#7C8798";
const YELLOW = "#FEDE00";
const TEAL = "#0FA3A3";
const RED = "#E1553F";

function Card({ children, className = "" }) {
  return <div className={`bg-white rounded-xl border border-gray-200 shadow-sm ${className}`}>{children}</div>;
}

// ---- Pure SVG line chart (no external chart library needed) ----
function TrendChart({ active }) {
  const W = 800, H = 300;
  const padL = 40, padR = 20, padT = 20, padB = 30;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const yMax = 30;

  const xFor = (i) => padL + (i / (TREND.length - 1)) * chartW;
  const yFor = (v) => padT + chartH - (v / yMax) * chartH;

  const [hover, setHover] = useState(null);

  return (
    <div className="w-full overflow-x-auto">
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ minWidth: 500 }}>
        <rect x={xFor(0)} y={padT} width={xFor(1) - xFor(0)} height={chartH} fill={RED} opacity="0.06" />

        {[0, 5, 10, 15, 20, 25, 30].map((v) => (
          <g key={v}>
            <line x1={padL} y1={yFor(v)} x2={W - padR} y2={yFor(v)} stroke="#EAECEF" strokeWidth="1" />
            <text x={padL - 6} y={yFor(v) + 3} fontSize="9" fill={SLATE} textAnchor="end">{v}%</text>
          </g>
        ))}

        <line x1={padL} y1={yFor(25)} x2={W - padR} y2={yFor(25)} stroke={RED} strokeWidth="1.5" strokeDasharray="5 4" />
        <text x={W - padR} y={yFor(25) - 5} fontSize="10" fontWeight="600" fill={RED} textAnchor="end">25% threshold</text>

        <line x1={xFor(2)} y1={padT} x2={xFor(2)} y2={padT + chartH} stroke={TEAL} strokeWidth="1.5" strokeDasharray="2 3" />
        <text x={xFor(2)} y={padT - 6} fontSize="9" fontWeight="600" fill={TEAL} textAnchor="middle">fix shipped</text>

        {TREND.map((d, i) => (
          <text key={d.month} x={xFor(i)} y={H - 8} fontSize="10" fill={SLATE} textAnchor="middle">{d.month}</text>
        ))}

        {CATS.map((c) => {
          const isDim = active && active !== c.key;
          const points = TREND.map((d, i) => `${xFor(i)},${yFor(d[c.key])}`).join(" ");
          return (
            <g key={c.key} opacity={isDim ? 0.2 : 1}>
              <polyline points={points} fill="none" stroke={c.color} strokeWidth={active === c.key ? 3.5 : 2} strokeLinecap="round" strokeLinejoin="round" />
              {TREND.map((d, i) => (
                <circle
                  key={i}
                  cx={xFor(i)} cy={yFor(d[c.key])} r={active === c.key ? 4.5 : 3.5}
                  fill="white" stroke={c.color} strokeWidth="2"
                  onMouseEnter={() => setHover({ i, key: c.key, val: d[c.key] })}
                  onMouseLeave={() => setHover(null)}
                  style={{ cursor: "pointer" }}
                />
              ))}
            </g>
          );
        })}

        {hover && (
          <g>
            <rect x={xFor(hover.i) - 38} y={yFor(hover.val) - 32} width="76" height="22" rx="4" fill={NAVY} opacity="0.92" />
            <text x={xFor(hover.i)} y={yFor(hover.val) - 17} fontSize="10" fill="white" textAnchor="middle" fontWeight="600">
              {hover.key.split(" ")[0]}: {hover.val}%
            </text>
          </g>
        )}
      </svg>
    </div>
  );
}

function OOSDashboard() {
  const [active, setActive] = useState(null);
  const latest = TREND[TREND.length - 1];
  const first = TREND[0];

  const rows = CATS.map((c) => ({
    ...c,
    now: latest[c.key],
    then: first[c.key],
    delta: (latest[c.key] - first[c.key]).toFixed(1),
  }));
  const blendedNow = (rows.reduce((s, r) => s + r.now, 0) / rows.length).toFixed(1);

  return (
    <div className="min-h-screen p-4 md:p-7" style={{ fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif" }}>
      <div className="rounded-xl mb-5 p-5 md:p-6 relative overflow-hidden" style={{ background: NAVY }}>
        <div className="absolute right-0 top-0 h-full w-1.5" style={{ background: YELLOW }} />
        <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div>
            <span className="text-[11px] font-bold tracking-widest uppercase" style={{ color: YELLOW }}>
              Noon.com · KSA Beauty
            </span>
            <h1 className="text-white text-xl md:text-2xl font-semibold tracking-tight mt-1">
              Express OOS Revenue-Loss Assurance
            </h1>
            <p className="text-[13px] text-slate-300 mt-1">
              Standing risk signal across 4 sub-categories · BigQuery + Airflow, twice-daily refresh
            </p>
          </div>
          <div className="flex items-center gap-3 bg-white/5 border border-white/10 rounded-lg px-4 py-3">
            <Icon path={ICONS.shield} color={YELLOW} size={26} />
            <div>
              <div className="text-white text-lg font-bold leading-none">&lt; 25% held</div>
              <div className="text-[11px] text-slate-300 mt-0.5">all 4 sub-categories, through Q2 2026</div>
            </div>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        <Card className="p-4">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs text-[#7C8798] font-medium">Blended Loss %, Jun</span>
            <Icon path={ICONS.package} color={SLATE} />
          </div>
          <div className="text-2xl font-bold text-[#1F2A44]">{blendedNow}%</div>
          <div className="text-[11px] text-[#7C8798] mt-1">vs. 25% assurance threshold</div>
        </Card>
        <Card className="p-4">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs text-[#7C8798] font-medium">SKUs Price-Benchmarked</span>
            <Icon path={ICONS.package} color={SLATE} />
          </div>
          <div className="text-2xl font-bold text-[#1F2A44]">~8,000</div>
          <div className="text-[11px] text-[#7C8798] mt-1">org-wide Price Competitiveness standard</div>
        </Card>
        <Card className="p-4">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs text-[#7C8798] font-medium">AMs Supported</span>
            <Icon path={ICONS.users} color={SLATE} />
          </div>
          <div className="text-2xl font-bold text-[#1F2A44]">12</div>
          <div className="text-[11px] text-[#7C8798] mt-1">across KSA Beauty &amp; AE/SA FMCG</div>
        </Card>
        <Card className="p-4">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs text-[#7C8798] font-medium">Methodology Fix</span>
            <Icon path={ICONS.wrench} color={TEAL} />
          </div>
          <div className="text-2xl font-bold" style={{ color: TEAL }}>Mar '26</div>
          <div className="text-[11px] text-[#7C8798] mt-1">sku_priority + oos_complete de-dup shipped</div>
        </Card>
      </div>

      <Card className="p-4 md:p-5 mb-5">
        <div className="flex flex-col md:flex-row md:items-center md:justify-between mb-3 gap-2">
          <div>
            <h3 className="text-sm font-semibold text-[#1F2A44]">Express OOS Revenue-Loss %, by Sub-Category</h3>
            <p className="text-[11px] text-[#7C8798] mt-0.5">shaded band = pre-fix double-counted readings · tap a chip to isolate a line · hover dots for values</p>
          </div>
          <div className="flex gap-1.5 flex-wrap">
            {CATS.map((c) => (
              <button
                key={c.key}
                onClick={() => setActive(active === c.key ? null : c.key)}
                className="px-2.5 py-1 rounded-full text-[11px] font-medium border transition-all"
                style={{
                  borderColor: c.color,
                  background: active === c.key ? c.color : "white",
                  color: active === c.key ? "white" : c.color,
                  opacity: active && active !== c.key ? 0.45 : 1,
                }}
              >
                {c.key}
              </button>
            ))}
          </div>
        </div>
        <TrendChart active={active} />
      </Card>

      <Card className="p-4 md:p-5 mb-5">
        <h3 className="text-sm font-semibold text-[#1F2A44] mb-3">Sub-Category Ownership &amp; Movement</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-[#7C8798] border-b border-gray-200">
                <th className="py-2 pr-4 font-medium">Sub-Category</th>
                <th className="py-2 pr-4 font-medium">AM Owner</th>
                <th className="py-2 pr-4 font-medium text-right">Jan (pre-fix)</th>
                <th className="py-2 pr-4 font-medium text-right">Jun (current)</th>
                <th className="py-2 pr-4 font-medium text-right">Movement</th>
                <th className="py-2 font-medium">Status</th>
              </tr>
            </thead>
            <tbody>
              {rows.filter((r) => !active || r.key === active).map((r) => (
                <tr key={r.key} className="border-b border-gray-100 hover:bg-gray-50">
                  <td className="py-2 pr-4 font-medium text-[#1F2A44]">
                    <span className="inline-flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full inline-block" style={{ background: r.color }}></span>
                      {r.key}
                    </span>
                  </td>
                  <td className="py-2 pr-4 text-[#5A6472]">{r.am}</td>
                  <td className="py-2 pr-4 text-right text-[#7C8798]">{r.then}%</td>
                  <td className="py-2 pr-4 text-right font-semibold text-[#1F2A44]">{r.now}%</td>
                  <td className="py-2 pr-4 text-right font-semibold" style={{ color: TEAL }}>
                    <span className="inline-flex items-center gap-1">
                      <Icon path={ICONS.trendDown} color={TEAL} size={12} /> {r.delta}pp
                    </span>
                  </td>
                  <td className="py-2">
                    <span className="px-2 py-0.5 rounded-full text-[10px] font-semibold" style={{ background: "#E4F7F5", color: "#0B7A7A" }}>
                      Within 25% threshold
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>

      <Card className="p-3.5 mb-4">
        <p className="text-[11px] text-[#7C8798] leading-relaxed">
          <span className="font-semibold text-[#5A6472]">Methodology:</span> Express OOS revenue-loss % is computed
          on a de-duplicated <span className="font-mono text-[10.5px]">sku_priority + oos_complete</span> basis —
          a foundational double-count in the legacy metric was diagnosed and corrected in March 2026; corrected logic
          now underpins every OOS figure in the portfolio and feeds the same pipeline as the Price Competitiveness
          standard (~8,000 SKUs) and the AM/Seller Performance Dashboard (BigQuery + Airflow, twice-daily DAG).
          Figures shown reflect the real project scope and direction; exact confidential values are illustrative.
        </p>
      </Card>

      <p className="text-center text-[11px] text-[#A2ABB8] pb-2">
        Built by Abhinav Goyal · Lead Business Analyst, Noon.com ·
        <a href="https://agdecodes.github.io" className="ml-1 underline hover:text-[#0FA3A3]">agdecodes.github.io</a>
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OOSDashboard />);
</script>

<script>
  // Manually transform the JSX source with the CLASSIC runtime (React.createElement),
  // avoiding Babel's newer "automatic" runtime which injects an ES module import
  // statement that fails when run as a plain (non-module) inline script.
  var src = document.getElementById("app-source").textContent;
  var output = Babel.transform(src, {
    presets: [["react", { runtime: "classic" }]]
  }).code;
  var script = document.createElement("script");
  script.textContent = output;
  document.body.appendChild(script);
</script>
</body>
</html>
